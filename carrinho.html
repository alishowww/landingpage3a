<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho de Compras Profissional</title>
    <link rel="stylesheet" href="carrinho.css">
    <!-- Ícones Lucide (Modernos e leves) -->
    <script src="https://unpkg.com"></script>
</head>
<body>

<main class="cart-container">
    <header class="cart-header">
        <h1>Seu Carrinho</h1>
        <span id="cart-count">2 itens</span>
    </header>

    <div class="cart-content">
        <!-- Lista de Produtos -->
        <section class="cart-items" id="cart-items-list">
            <!-- Item 1 -->
            <article class="cart-item" data-id="1" data-price="89.90">
                <img src="https://unsplash.com" alt="Camiseta Streetwear" class="item-img">
                <div class="item-details">
                    <h2 class="item-title">Camiseta Streetwear Black</h2>
                    <p class="item-sku">Ref: #ST-9920</p>
                </div>
                <div class="item-quantity">
                    <button class="qty-btn minus" onclick="changeQty(this, -1)">-</button>
                    <input type="number" class="qty-input" value="1" min="1" readonly>
                    <button class="qty-btn plus" onclick="changeQty(this, 1)">+</button>
                </div>
                <div class="item-price-block">
                    <span class="item-price">R$ 89,90</span>
                    <button class="remove-btn" onclick="removeItem(this)" title="Remover item">
                        <i data-lucide="trash-2"></i>
                    </button>
                </div>
            </article>

            <!-- Item 2 -->
            <article class="cart-item" data-id="2" data-price="149.90">
                <img src="https://unsplash.com" alt="Calça Cargo" class="item-img">
                <div class="item-details">
                    <h2 class="item-title">Calça Cargo Slim Khaki</h2>
                    <p class="item-sku">Ref: #CG-4412</p>
                </div>
                <div class="item-quantity">
                    <button class="qty-btn minus" onclick="changeQty(this, -1)">-</button>
                    <input type="number" class="qty-input" value="1" min="1" readonly>
                    <button class="qty-btn plus" onclick="changeQty(this, 1)">+</button>
                </div>
                <div class="item-price-block">
                    <span class="item-price">R$ 149,90</span>
                    <button class="remove-btn" onclick="removeItem(this)" title="Remover item">
                        <i data-lucide="trash-2"></i>
                    </button>
                </div>
            </article>
        </section>

        <!-- Resumo Lateral -->
        <aside class="cart-summary">
            <h2>Resumo do Pedido</h2>
           
            <!-- Simulador de Frete -->
            <div class="summary-box shipping-box">
                <label for="cep">Calcular Frete</label>
                <div class="input-group">
                    <input type="text" id="cep" placeholder="00000-000" maxlength="9">
                    <button onclick="calculateShipping()">Calcular</button>
                </div>
                <span id="shipping-result" class="success-text"></span>
            </div>

            <!-- Cupom de Desconto -->
            <div class="summary-box coupon-box">
                <label for="coupon">Cupom de Desconto</label>
                <div class="input-group">
                    <input type="text" id="coupon" placeholder="Digite seu cupom">
                    <button onclick="applyCoupon()">Aplicar</button>
                </div>
                <span id="coupon-result" class="success-text"></span>
            </div>

            <!-- Valores Finais -->
            <div class="summary-totals">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal-val">R$ 239,80</span>
                </div>
                <div class="summary-row">
                    <span>Frete</span>
                    <span id="shipping-val">R$ 0,00</span>
                </div>
                <div class="summary-row discount-row" id="discount-block" style="display: none;">
                    <span>Desconto (10%)</span>
                    <span id="discount-val">- R$ 0,00</span>
                </div>
                <div class="summary-row total-row">
                    <span>Total</span>
                    <span id="total-val">R$ 239,80</span>
                </div>
            </div>

            <button class="checkout-btn" onclick="checkout()">
                <span>Ir para o pagamento</span>
                <i data-lucide="arrow-right"></i>
            </button>
        </aside>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
